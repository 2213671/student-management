<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Danh Sach Sinh Vien</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
      .text-danger {
        color: red;
      }
      .message {
        background-color: #d4edda;
        color: #155724;
        padding: 10px;
        margin-bottom: 20px;
        border-radius: 4px;
      }
      .btn-add {
        display: inline-block;
        padding: 8px 15px;
        background-color: #4caf50;
        color: white;
        text-decoration: none;
        border-radius: 3px;
        margin-bottom: 15px;
      }
      .btn-detail {
        background-color: #2196f3;
        color: white;
        padding: 3px 8px;
        text-decoration: none;
        border-radius: 3px;
      }
      .btn-delete {
        background-color: #f44336;
        color: white;
        padding: 3px 8px;
        text-decoration: none;
        border-radius: 3px;
        margin-left: 5px;
      }
      .search-form {
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <h1>Danh Sach Sinh Vien</h1>

    <!-- Hiển thị thông báo -->
    <div th:if="${message}" class="message" th:text="${message}"></div>

    <!-- Form tìm kiếm -->
    <div class="search-form">
      <form action="/students" method="GET">
        <input
          type="text"
          name="keyword"
          placeholder="Nhap ten..."
          th:value="${keyword}"
        />
        <button type="submit">Tìm</button>
        <a href="/students" style="margin-left: 10px">Xóa lọc</a>
      </form>
    </div>

    <!-- Nút Thêm Mới -->
    <a href="/students/new" class="btn-add">+ Thêm Mới</a>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Ho va Ten</th>
          <th>Email</th>
          <th>Tuoi</th>
          <th>Thao tac</th>
        </tr>
      </thead>
      <tbody>
        <tr
          th:each="student : ${dsSinhVien}"
          th:class="${student.age < 18} ? 'text-danger' : ''"
        >
          <td th:text="${student.id}">ID Mau</td>
          <td th:text="${student.name}">Ten Mau</td>
          <td th:text="${student.email}">Email Mau</td>
          <td th:text="${student.age}">0</td>
          <td>
            <a th:href="@{'/students/' + ${student.id}}" class="btn-detail"
              >Xem Chi Tiết</a
            >
            <a
              th:href="@{'/students/delete/' + ${student.id}}"
              class="btn-delete"
              onclick="return confirm('Bạn có chắc muốn xóa?');"
              >Xóa</a
            >
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(dsSinhVien)}">
          <td colspan="5" style="text-align: center; padding: 20px">
            Không tìm thấy sinh viên nào
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
