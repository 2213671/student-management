<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title th:if="${student.id == null}">Them Sinh Vien</title>
    <title th:if="${student.id != null}">Chinh Sua Sinh Vien</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .form-container {
        border: 1px solid #ddd;
        padding: 20px;
        max-width: 500px;
        margin: 0 auto;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: inline-block;
        width: 80px;
        font-weight: bold;
      }
      input[type="text"],
      input[type="number"] {
        padding: 8px;
        width: 300px;
        border: 1px solid #ddd;
        border-radius: 3px;
      }
      .btn {
        padding: 8px 15px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        margin-right: 10px;
      }
      .btn-save {
        background-color: #4caf50;
        color: white;
      }
      .btn-cancel {
        background-color: #555;
        color: white;
        text-decoration: none;
        padding: 8px 15px;
      }
    </style>
  </head>
  <body>
    <h1 th:if="${student.id == null}">Them Sinh Vien Moi</h1>
    <h1 th:if="${student.id != null}">Chinh Sua Sinh Vien</h1>

    <div class="form-container">
      <form action="/students/save" method="POST">
        <!-- ID hidden khi sửa -->
        <input type="hidden" name="id" th:value="${student.id}" />

        <div class="form-group">
          <label>ID:</label>
          <input
            type="text"
            name="id"
            th:value="${student.id}"
            th:readonly="${student.id != null}"
          />
          <span
            th:if="${student.id != null}"
            style="color: #666; font-size: 0.9em"
          >
            (Không thể sửa ID)
          </span>
        </div>

        <div class="form-group">
          <label>Ho Ten:</label>
          <input type="text" name="name" th:value="${student.name}" required />
        </div>

        <div class="form-group">
          <label>Email:</label>
          <input
            type="text"
            name="email"
            th:value="${student.email}"
            required
          />
        </div>

        <div class="form-group">
          <label>Tuoi:</label>
          <input type="number" name="age" th:value="${student.age}" required />
        </div>

        <div style="margin-top: 20px">
          <button type="submit" class="btn btn-save">Lưu</button>
          <a href="/students" class="btn-cancel">Hủy</a>
        </div>
      </form>
    </div>
  </body>
</html>
